<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Modifier mon CV</title>
    <meta name="description" content="Formulaire pour modifier dynamiquement le CV principal" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <a href="index.html" class="logo">Modifier mon CV</a>
    </header>

    <main>
      <section class="section">
        <div class="section-title">
          <p class="eyebrow">Formulaire</p>
          <h2>Renseignez les informations du CV</h2>
        </div>
        <div class="editor-grid">
          <form id="cv-form" class="cv-form">
            <div class="form-grid">
              <label>
                Nom complet
                <input type="text" name="name" />
              </label>
              <label>
                Titre
                <input type="text" name="role" />
              </label>
              <label class="full">
                Résumé
                <textarea name="summary" rows="3"></textarea>
              </label>
              <label class="full">
                À propos 1
                <textarea name="about1" rows="3"></textarea>
              </label>
              <label class="full">
                À propos 2
                <textarea name="about2" rows="3"></textarea>
              </label>
              <label>
                Expérience 1
                <input type="text" name="experienceTitle1" />
              </label>
              <label>
                Date expérience 1
                <input type="text" name="experienceMeta1" />
              </label>
              <label class="full">
                Description expérience 1
                <textarea name="experienceText1" rows="2"></textarea>
              </label>
              <label>
                Expérience 2
                <input type="text" name="experienceTitle2" />
              </label>
              <label>
                Date expérience 2
                <input type="text" name="experienceMeta2" />
              </label>
              <label class="full">
                Description expérience 2
                <textarea name="experienceText2" rows="2"></textarea>
              </label>
              <label class="full">
                Formation
                <textarea name="education" rows="3"></textarea>
              </label>
              <label class="full">
                Compétences (séparées par des virgules)
                <input type="text" name="skills" />
              </label>
              <label>
                Email
                <input type="email" name="email" />
              </label>
              <label>
                Téléphone
                <input type="text" name="phone" />
              </label>
              <label>
                Ville
                <input type="text" name="city" />
              </label>
            </div>
            <div class="form-actions">
              <button type="submit" class="btn btn-primary">Envoyer et mettre à jour le CV</button>
              <a href="index.html" class="btn btn-secondary">Retour au CV</a>
            </div>
          </form>
          <div class="preview-card">
            <h3>Aperçu rapide</h3>
            <p class="preview-label">Nom</p>
            <h4 id="preview-name">Sokamdoum Fongang Yann</h4>
            <p class="preview-label">Titre</p>
            <p id="preview-role">Développeur Web & Designer</p>
            <p class="preview-label">Résumé</p>
            <p id="preview-summary">Je transforme les idées en interfaces élégantes, rapides et orientées utilisateur.</p>
            <p class="preview-label">Compétences</p>
            <div id="preview-skills" class="preview-skills"></div>
          </div>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
